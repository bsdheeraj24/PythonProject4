<!DOCTYPE html>
<html lang="en">
<head>
  <title>Users - Smart Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow px-3">
  <a class="navbar-brand fw-bold" href="/dashboard">⬅ Dashboard</a>
  <span class="text-white fw-bold">👥 Manage Users</span>
  <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
</nav>

<div class="container mt-4">

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="fw-bold mb-3">Add New User</h5>
      <form method="POST" class="row g-3">
        <div class="col-md-5">
          <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>
        <div class="col-md-5">
          <input type="text" name="password" class="form-control" placeholder="Password" required>
        </div>
        <div class="col-md-2 d-grid">
          <button class="btn btn-primary fw-bold">Add</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <h5 class="fw-bold mb-3">Existing Users</h5>

      <table class="table table-bordered table-hover">
        <thead class="table-primary">
          <tr>
            <th>Username</th>
            <th>Role</th>
            <th width="160">Action</th>
          </tr>
        </thead>
        <tbody>
          {% for uname, u in users.items() %}
          <tr>
            <td>{{ uname }}</td>
            <td>{{ u.role }}</td>
            <td>
              <a href="/delete_user/{{ uname }}" class="btn btn-danger btn-sm"
                 onclick="return confirm('Delete user {{ uname }} ?')">
                Delete
              </a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

    </div>
  </div>

</div>
</body>
</html>
