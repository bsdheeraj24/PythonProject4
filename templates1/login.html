<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login - Smart Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      min-height:100vh;
      background: linear-gradient(135deg,#eef3ff,#f9fbff);
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .card{ border-radius:18px; }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg">
        <div class="card-body p-4">
          <h3 class="text-center fw-bold mb-3">🎓 Smart Attendance</h3>
          <p class="text-center text-muted mb-4">Login to continue</p>

          {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
          {% endif %}

          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100 fw-bold">Login</button>
          </form>

          <div class="text-center mt-3 text-muted" style="font-size:0.9rem;">
            Powered by ESP32-CAM + Flask + Face Recognition
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
