<!DOCTYPE html>
<html lang="en">
<head>
  <title>Add Face Capture - Smart Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow px-3">
  <a class="navbar-brand fw-bold" href="/faces">⬅ Back</a>
  <span class="text-white fw-bold">📸 Add Face Capture</span>
</nav>

<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-body">
      <h5 class="fw-bold mb-3">Upload 10 Face Images</h5>

      <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label fw-semibold">Person Name</label>
          <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Select 10 Images</label>
          <input type="file" name="images" class="form-control" accept="image/*" multiple required>
          <div class="text-muted mt-1">Please select exactly 10 images.</div>
        </div>

        <button class="btn btn-primary fw-bold w-100">Upload 10 Images</button>
      </form>
    </div>
  </div>
</div>

</body>
</html>
