services:
  - type: web
    name: face-attendance
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: "10000"
