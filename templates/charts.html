<!DOCTYPE html>
<html>
<head>
  <title>Charts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-warning px-3">
  <span class="navbar-brand text-dark">📊 Attendance Charts</span>
  <a href="/dashboard" class="btn btn-sm btn-dark">Back</a>
</nav>

<div class="container mt-4 text-center">
  <div class="card shadow">
    <div class="card-body">
      <form method="GET" action="/charts" class="row g-2 justify-content-center mb-3">
        <div class="col-auto">
          <input type="date" name="date" class="form-control" value="{{ chart_date }}">
        </div>
        <div class="col-auto">
          <button class="btn btn-primary">Apply</button>
        </div>
      </form>

      <h5>Daily IN Count</h5>
      <div class="text-muted">Date: {{ chart_pretty_date }}</div>
      <img src="/static/chart.png" class="img-fluid mt-3">
    </div>
  </div>
</div>

</body>
</html>
