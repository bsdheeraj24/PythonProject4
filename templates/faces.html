<!DOCTYPE html>
<html>
<head>
  <title>Faces</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">👤 Enrolled Faces</span>
  <a href="/dashboard" class="btn btn-sm btn-light">Back</a>
</nav>

<div class="container mt-4">

  {% if message %}
  <div class="alert alert-success" role="alert">
    {{ message }}
  </div>
  {% endif %}

  <!-- ADD FACE OPTIONS -->
  <div class="mb-3">
    <a href="/add_face_upload" class="btn btn-primary me-2">➕ Upload Images</a>
    <a href="/add_face_capture" class="btn btn-secondary">📸 Live Capture (10)</a>
  </div>

  <!-- USER LIST -->
  <div class="row">
    {% for u in users %}
    <div class="col-6 col-md-3 mb-4 text-center">
      <div class="card shadow-sm">
        <div class="card-body">
          <h6>{{ u.name }}</h6>
          <div class="text-muted small mb-2">Images enrolled: {{ u.count }}</div>
          <form method="POST" action="/rename_face" class="mb-2">
            <input type="hidden" name="old_name" value="{{ u.name }}">
            <input type="text" name="new_name" class="form-control form-control-sm mb-2"
                   value="{{ u.name }}" required>
            <button type="submit" class="btn btn-sm btn-outline-primary">Save Name</button>
          </form>
          <a href="/delete/{{u.name}}" class="btn btn-sm btn-danger"
             onclick="return confirm('Delete {{u.name}}?')">
            Delete
          </a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

</div>

</body>
</html>
