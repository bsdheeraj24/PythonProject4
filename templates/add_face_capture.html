<!DOCTYPE html>
<html>
<head>
  <title>Add Face – Live Capture</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">📸 Live Face Capture</span>
  <a href="/faces" class="btn btn-sm btn-light">Back</a>
</nav>

<div class="container mt-4">

  <div class="card shadow-lg mx-auto" style="max-width: 520px;">
    <div class="card-body">

      <h5 class="text-center mb-3">Capture 10 Face Images</h5>

      <div class="mb-3">
        <label class="form-label">Person Name</label>
        <input id="name" class="form-control" placeholder="Enter name">
      </div>

      <div class="text-center mb-3">
        <video id="video" autoplay playsinline
               class="rounded border"
               style="width:100%; max-height:300px;"></video>
      </div>

      <div class="alert alert-info text-center py-2">
        Keep your face steady for <b>2 seconds</b><br>
        10 images will be captured automatically
      </div>

      <div class="d-grid">
        <button id="captureBtn" class="btn btn-primary btn-lg"
                onclick="startCapture()">
          📷 Start Capture
        </button>
      </div>

      <div id="captureStatus" class="small text-muted text-center mt-2"></div>

      <form method="POST" enctype="multipart/form-data" id="form">
        <input type="hidden" name="name" id="hiddenName">
      </form>

    </div>
  </div>

</div>

<script>
const video = document.getElementById("video");
const form = document.getElementById("form");
const hiddenName = document.getElementById("hiddenName");
const captureBtn = document.getElementById("captureBtn");
const captureStatus = document.getElementById("captureStatus");

navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => video.srcObject = stream)
  .catch(() => alert("Camera access blocked. Use localhost or HTTPS"));

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function captureBlob() {
  const sourceW = video.videoWidth || 640;
  const sourceH = video.videoHeight || 480;

  const targetW = 480;
  const targetH = Math.round((sourceH / sourceW) * targetW) || 360;

  const canvas = document.createElement("canvas");
  canvas.width = targetW;
  canvas.height = targetH;
  canvas.getContext("2d").drawImage(video, 0, 0, targetW, targetH);

  return new Promise(resolve => {
    canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.65);
  });
}

async function startCapture() {
  const name = document.getElementById("name").value.trim();
  if (!name) {
    alert("Please enter name");
    return;
  }

  if (!video.videoWidth || !video.videoHeight) {
    alert("Camera is not ready yet. Please wait 1-2 seconds and try again.");
    return;
  }

  captureBtn.disabled = true;
  captureBtn.textContent = "Capturing...";
  captureStatus.textContent = "Preparing capture...";

  hiddenName.value = name;

  // Clear previous file inputs if user retries without page reload.
  form.querySelectorAll('input[name="images"]').forEach(node => node.remove());

  let captured = 0;
  for (let i = 1; i <= 10; i++) {
    captureStatus.textContent = `Capturing image ${i}/10...`;
    const blob = await captureBlob();
    if (!blob || blob.size === 0) {
      captureBtn.disabled = false;
      captureBtn.textContent = "📷 Start Capture";
      captureStatus.textContent = "Capture failed. Please try again.";
      alert("Capture failed for one frame. Please try again.");
      return;
    }

    const file = new File([blob], `img_${i}.jpg`, { type: "image/jpeg" });
    const input = document.createElement("input");
    input.type = "file";
    input.name = "images";

    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    form.appendChild(input);

    captured++;
    await sleep(180);
  }

  if (captured !== 10) {
    captureBtn.disabled = false;
    captureBtn.textContent = "📷 Start Capture";
    captureStatus.textContent = "Could not capture 10 images. Please retry.";
    alert("Could not capture 10 images. Please retry.");
    return;
  }

  captureStatus.textContent = "Uploading 10 images...";
  form.submit();
}
</script>

</body>
</html>
